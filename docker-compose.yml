
services:
  jupyter-pyspark:
    image: quay.io/jupyter/pyspark-notebook:latest
    container_name: jupyter-pysparkk
    ports:
      - "4040:4040"    # Spark UI
      - "8888:8888"    # Jupyter
    volumes:
      - ./:/home/jovyan/work
      - ./requirements.txt:/home/jovyan/requirements.txt
      - ./drivers/postgresql-42.5.1.jar:/usr/local/spark/jars/postgresql-42.5.1.jar
    env_file:
      - ./.env           # loads JUPYTER_TOKEN, SPARK_OPTS, POSTGRES_*, PGADMIN_*
    depends_on:
      - db
    command: >
      bash -c "pip install -r /home/jovyan/requirements.txt &&
      start-notebook.sh --NotebookApp.token=${JUPYTER_TOKEN}"

  db:
    container_name: postgres_labb
    image: postgres
    env_file:
      - ./.env           # loads POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - pgnetwork

  pgadmin:
    image: dpage/pgadmin4
    container_name: postgres_lab_pgadminn
    env_file:
      - ./.env           # loads PGADMIN_DEFAULT_EMAIL, PGADMIN_DEFAULT_PASSWORD
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    networks:
      - pgnetwork

networks:
  pgnetwork:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
