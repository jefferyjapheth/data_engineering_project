

services:

  mysql:
    image: mysql:latest
    container_name: mysql
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql_data:/var/lib/mysql
    networks:
      - pgnetwork
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:latest
    container_name: postgres_labb
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres_setup.sql:/docker-entrypoint-initdb.d/postgres_setup.sql
    networks:
      - pgnetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: postgres_lab_pgadminn
    env_file:
      - .env
    environment:
       PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
       PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/pgadmin_data:/var/lib/pgadmin
    networks:
      - pgnetwork
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_LIVE_ALLOWED_ORIGINS=*
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/grafana_data:/var/lib/grafana
      - ./utils/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./utils/grafana_dashboard.yml:/etc/grafana/provisioning/dashboards/grafana_dashboard.yml
      - ./utils/grafana_dashboards:/etc/grafana/provisioning/dashboards/grafana_dashboards
    networks:
      - pgnetwork
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark:
    image: bitnami/spark:latest
    env_file:
      - .env
    environment:
      - SPARK_MODE=master
    user: root
    ports:
      - "8080:8080"
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./utils/postgresql-42.7.5.jar:/opt/spark/resources/postgresql-42.7.5.jar
      - ./utils/mysql-connector-j-9.3.0.jar:/opt/spark/resources/mysql-connector-j-9.3.0.jar
      - ./data/checkpoint:/opt/spark/checkpoint         
      - ./utils:/opt/spark/utils
      - ./data/logs:/opt/spark/logs
    networks:
      - pgnetwork

  spark-worker:
    image: bitnami/spark:latest
    env_file:
      - .env
    depends_on:
      - spark
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
    ports:
      - "8081:8081"
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./utils/postgresql-42.7.5.jar:/opt/spark/resources/postgresql-42.7.5.jar
      - ./utils/mysql-connector-j-9.3.0.jar:/opt/spark/resources/mysql-connector-j-9.3.0.jar
      - ./data/checkpoint:/opt/spark/checkpoint         
      - ./utils:/opt/spark/utils
      - ./data/logs:/opt/spark/logs
    networks:
      - pgnetwork

  spark-job:
    build:
      context: .
      dockerfile: utils/Dockerfile.spark_job
    env_file:
      - .env
    depends_on:
      - spark
      - db
      - mysql
    user: root
    volumes:
      - ./data/logs:/app/logs                             
    networks:
      - pgnetwork

  data_extractor:
    build:
      context: .
      dockerfile: utils/Dockerfile.data_extractor
    env_file:
      - .env
    volumes:
      - ./data:/app/data  
      - ./utils:/app/utils
      - ./.env:/app/.env:ro
      - ./data_extractor:/app/data_extractor
      - ./data_extractor/kaggle.json:/root/.kaggle/kaggle.json:ro
    networks:
      - pgnetwork
    user: root

networks:
  pgnetwork:
    driver: bridge

volumes:
  pgadmin_data:
