
services:
  spark:
    image: bitnami/spark:latest
    env_file:
      - .env
    environment:
      - SPARK_MODE=master
    user: root
    ports:
      - '8080:8080'
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./postgresql-42.7.5.jar:/opt/spark/resource/postgresql-42.7.5.jar
      - ./checkpoint:/opt/spark/checkpoint
      - ./utils:/opt/spark/utils
    networks:
      - pgnetwork

  spark-worker:
    image: bitnami/spark:latest
    env_file:
      - .env
    depends_on:
      - spark
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./postgresql-42.7.5.jar:/opt/spark/resource/postgresql-42.7.5.jar
      - ./checkpoint:/opt/spark/checkpoint
      - ./utils:/opt/spark/utils
    ports:
      - '8081:8081'
    networks:
      - pgnetwork

  spark-job:
    build:
      context: .
      dockerfile: Dockerfile.spark_job
    env_file:
      - .env
    depends_on:
      - spark
      - kafka
      - db
    user: root
    volumes:
      - ./logs:/app/logs  # to persist logs
    networks:
      - pgnetwork


  db:
    container_name: postgres_labb
    image: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./postgres_setup.sql:/docker-entrypoint-initdb.d/postgres_setup.sql
    networks:
      - pgnetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: postgres_lab_pgadminn
    env_file:
      - .env
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    networks:
      - pgnetwork
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - pgnetwork

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - zookeeper
    networks:
      - pgnetwork
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_LIVE_ALLOWED_ORIGINS=*
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana_dashboard.yml:/etc/grafana/provisioning/dashboards/grafana_dashboard.yml
      - ./deliverables/grafana_dashboards:/etc/grafana/provisioning/dashboards/grafana_dashboards
    networks:
      - pgnetwork
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  data_generator:
    build:
      context: .
      dockerfile: Dockerfile.data_generator
    env_file:
      - .env
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - pgnetwork
    command: ["/wait-for-kafka.sh", "kafka", "python", "scripts/data_generator.py"]

networks:
  pgnetwork:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  grafana_data:
