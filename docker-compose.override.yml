services:

  mysql:
    image: mysql
    container_name: mysql_labb
    env_file:
      - .env
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql_data:/var/lib/mysql

  postgres:
    image: postgres:latest
    container_name: postgres_labb
    env_file:
      - .env
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_labb
    env_file:
      - .env
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8080:80"
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin

  spark:
    image: bitnami/spark:latest
    container_name: spark_labb
    env_file:
      - .env
    restart: unless-stopped
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"  # Spark master port
      - "8081:8080"  # Spark master web UI
    volumes:
      - ./scripts:/opt/airflow/scripts

  spark-worker:
    image: bitnami/spark:latest
    container_name: spark_worker_labb
    restart: unless-stopped
    depends_on:
      - spark
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark_labb:7077
    volumes:
      - ./scripts:/opt/airflow/scripts

  airflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_labb
    user: "1000:1000" 
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - mysql
      - postgres
      - spark
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      KAGGLE_USERNAME: ${KAGGLE_USERNAME}
      KAGGLE_KEY: ${KAGGLE_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "8082:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./plugins:/opt/airflow/plugins
      - ./include:/opt/airflow/include
      - ./airflow_settings.yaml:/opt/airflow/airflow_settings.yaml:ro
      - ./scripts/kaggle.json:/root/.kaggle/kaggle.json:ro
