apiVersion: 1

datasources:
  - name: Postgres
    type: postgres
    url: db:5432  # Use the container name for PostgreSQL service (db is the service name in Docker Compose)
    user: postgres  # Your PostgreSQL user (check your .env file or use 'postgres')
    secureJsonData:
      password: 'Amalitech'  # The password for the PostgreSQL user
    jsonData:
      database: heartrate_db  # The name of your PostgreSQL database
      sslmode: 'disable'  # Disable SSL mode for local development
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400  # Maximum lifetime of connections (in seconds)
      postgresVersion: 1600  # PostgreSQL 16
      timescaledb: false  # Set to true if using TimescaleDB
